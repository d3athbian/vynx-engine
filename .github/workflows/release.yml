name: Release Please

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    name: Release Please
    outputs:
      release_created: ${{ steps.release.outputs.release_created || steps.force-release.outputs.release_created }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: googleapis/release-please-action@v4
        id: release
        with:
          release-type: node
          target-branch: master
          skip-github-pull-request: true

      - name: Force release on master merge
        if: github.ref == 'refs/heads/master'
        id: force-release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Get latest tag version
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null | sed 's/^v//' || echo "0.0.0")
          
          echo "Latest tag: v$LATEST_TAG"
          
          # Extract version numbers
          MAJOR=$(echo $LATEST_TAG | cut -d. -f1)
          MINOR=$(echo $LATEST_TAG | cut -d. -f2)
          PATCH=$(echo $LATEST_TAG | cut -d. -f3)
          
          echo "Current: major=$MAJOR, minor=$MINOR, patch=$PATCH"
          
          # Calculate new version - increment patch
          NEW_PATCH=$((PATCH + 1))
          NEW_VERSION="$MAJOR.$MINOR.$NEW_PATCH"
          
          echo "New version: $NEW_VERSION"
          
          # Create new tag (commit already on master after merge)
          git tag "v$NEW_VERSION"
          git push origin "v$NEW_VERSION"
          
          # Create GitHub release
          gh release create "v$NEW_VERSION" --title "Release v$NEW_VERSION" --generate-notes
          
          echo "release_created=true" >> $GITHUB_OUTPUT
          echo "Created new release v$NEW_VERSION"

      - name: Create PR if no release
        if: steps.release.outputs.release_created != 'true' && github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_EXISTS=$(gh pr list --head main --base master --state open --json id -q '. | length')
          if [ "$PR_EXISTS" -eq "0" ]; then
            gh pr create --base master --head main \
              --title "Release: $(date +'%Y-%m-%d')" \
              --body "Release PR created from main to master"
          else
            echo "PR already exists"
          fi

  publish:
    runs-on: ubuntu-latest
    name: Build Release
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Verify build
        run: |
          if [ ! -f "dist/index.js" ]; then
            echo "Build failed: dist/index.js not found"
            exit 1
          fi

  sync-main:
    runs-on: ubuntu-latest
    name: Sync Master to Main
    if: github.ref == 'refs/heads/master'
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: master

      - name: Debug info
        run: |
          echo "Current branch: ${{ github.ref }}"
          echo "Creating backport PR from master to main"

      - name: Create Sync PR
        run: |
          gh pr create \
            --base main \
            --head master \
            --title "chore: sync master to main after release" \
            --body "Automated backport of release changes from master to main." || echo "PR already exists or no changes to sync"
