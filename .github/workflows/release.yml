name: Release

on:
  push:
    branches: [main, master]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    name: Release Please
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.GABO_IA }}
          target-branch: master

  publish:
    runs-on: ubuntu-latest
    name: Build Release
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Verify build
        run: |
          if [ ! -f "dist/index.js" ]; then
            echo "Build failed: dist/index.js not found"
            exit 1
          fi

  backport:
    runs-on: ubuntu-latest
    name: Backport to main
    needs: [release-please, publish]
    if: ${{ needs.release-please.outputs.release_created == 'true' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GABO_IA }}

      - name: Create backport PR
        env:
          GH_TOKEN: ${{ secrets.GABO_IA }}
        run: |
          TAG="${{ needs.release-please.outputs.tag_name }}"
          BACKPORT_BRANCH="backport/${TAG}"
          echo "Backporting release $TAG to main"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Create backport branch from main, merge master with auto-resolve
          git checkout -b "$BACKPORT_BRANCH" origin/main
          git merge origin/master -X theirs --no-edit \
            -m "chore: backport $TAG to main"

          git push origin "$BACKPORT_BRANCH"

          # Create PR from backport branch to main
          PR_EXISTS=$(gh pr list --head "$BACKPORT_BRANCH" --base main --state open --json id -q '. | length')
          if [ "$PR_EXISTS" -eq "0" ]; then
            gh pr create --base main --head "$BACKPORT_BRANCH" \
              --title "chore: backport $TAG to main" \
              --body "Backport release $TAG — syncs version bump and changelog to main."
          else
            echo "Backport PR already exists, skipping"
          fi
