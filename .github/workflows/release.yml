name: Release Please

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    name: Release Please
    outputs:
      release_created: ${{ steps.release.outputs.release_created || steps.force-release.outputs.release_created }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: googleapis/release-please-action@v4
        id: release
        with:
          release-type: node
          target-branch: master
          skip-github-pull-request: true

      - name: Force release on master merge
        if: github.ref == 'refs/heads/master'
        id: force-release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Get current version from package.json
          VERSION=$(node -p "require('./package.json').version")
          echo "Current version: $VERSION"
          
          # Create a tag for the release
          git tag "v$VERSION" || echo "Tag already exists"
          git push origin "v$VERSION" || echo "Tag push failed"
          
          # Create GitHub release
          gh release create "v$VERSION" --title "Release v$VERSION" --generate-notes || echo "Release may already exist"
          
          echo "release_created=true" >> $GITHUB_OUTPUT

      - name: Create PR if no release
        if: steps.release.outputs.release_created != 'true' && github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_EXISTS=$(gh pr list --head main --base master --state open --json id -q '. | length')
          if [ "$PR_EXISTS" -eq "0" ]; then
            gh pr create --base master --head main \
              --title "Release: $(date +'%Y-%m-%d')" \
              --body "Release PR created from main to master"
          else
            echo "PR already exists"
          fi

  publish:
    runs-on: ubuntu-latest
    name: Build Release
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Verify build
        run: |
          if [ ! -f "dist/index.js" ]; then
            echo "Build failed: dist/index.js not found"
            exit 1
          fi

  sync-main:
    runs-on: ubuntu-latest
    name: Sync Master to Main
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true' && github.ref == 'refs/heads/master'
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: master

      - name: Create Sync PR
        run: |
          gh pr create \
            --base main \
            --head master \
            --title "chore: sync master to main after release" \
            --body "Automated backport of release changes from master to main." || echo "PR already exists or no changes to sync"
