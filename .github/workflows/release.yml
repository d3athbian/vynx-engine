name: Release Please

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    name: Release Please
    outputs:
      release_created: ${{ steps.release.outputs.release_created || steps.force-release.outputs.release_created }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: googleapis/release-please-action@v4
        id: release
        with:
          release-type: node
          target-branch: master
          skip-github-pull-request: true

      - name: Force release on master merge
        if: github.ref == 'refs/heads/master'
        id: force-release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Get version from package.json (already bumped in main)
          CURRENT_VERSION=$(node -p "require('./package.json').version")
          
          echo "Package version: $CURRENT_VERSION"
          
          # Create new tag
          git tag "v$CURRENT_VERSION"
          git push origin "v$CURRENT_VERSION"
          
          # Create GitHub release
          gh release create "v$CURRENT_VERSION" --title "Release v$CURRENT_VERSION" --generate-notes
          
          echo "release_created=true" >> $GITHUB_OUTPUT
          echo "Created release v$CURRENT_VERSION"

      - name: Create PR if no release
        if: steps.release.outputs.release_created != 'true' && github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Get version from package.json
          VERSION=$(node -p "require('./package.json').version")
          echo "Package version: $VERSION"
          
          # Check if PR already exists
          PR_EXISTS=$(gh pr list --head main --base master --state open --json id -q '. | length')
          if [ "$PR_EXISTS" -eq "0" ]; then
            gh pr create --base master --head main \
              --title "Release: v$VERSION" \
              --body "Release v$VERSION"
          else
            echo "PR already exists"
          fi

  publish:
    runs-on: ubuntu-latest
    name: Build Release
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Verify build
        run: |
          if [ ! -f "dist/index.js" ]; then
            echo "Build failed: dist/index.js not found"
            exit 1
          fi

  sync-main:
    runs-on: ubuntu-latest
    name: Sync Master to Main
    if: github.ref == 'refs/heads/master'
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: master

      - name: Debug info
        run: |
          echo "Current branch: ${{ github.ref }}"
          echo "Event: ${{ github.event_name }}"
          echo "Creating backport PR from master to main"

      - name: Create Sync PR
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "Creating backport PR..."
          gh pr create \
            --base main \
            --head master \
            --title "backport: release to main" \
            --body "Automated backport of release from master to main." || echo "PR already exists or error: $?"
