name: Release Please

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    name: Release Please
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      releases_created: ${{ steps.release.outputs.releases_created }}
    steps:
      - name: Debug - show inputs
        run: |
          echo "Debug: Running release-please action"
          echo "Repository: ${{ github.repository }}"
          echo "Ref: ${{ github.ref }}"
      
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          release-type: node
          target-branch: master
          skip-github-pull-request: false

      - name: Debug - show outputs
        run: |
          echo "release_created: '${{ steps.release.outputs.release_created }}'"
          echo "releases_created: '${{ steps.release.outputs.releases_created }}'"
          echo "All outputs: ${{ toJson(steps.release.outputs) }}"

  publish:
    runs-on: ubuntu-latest
    name: Build Release
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Verify build
        run: |
          if [ ! -f "dist/index.js" ]; then
            echo "Build failed: dist/index.js not found"
            exit 1
          fi

  sync-main:
    runs-on: ubuntu-latest
    name: Sync Master to Main
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: master

      - name: Install GitHub CLI
        run: sudo apt-get update && sudo apt-get install gh -y

      - name: Create Sync PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh auth login --with-token <<< "$GH_TOKEN"
          gh pr create \
            --base main \
            --head master \
            --title "chore: sync master to main after release" \
            --body "Automated backport of release changes from master to main." || echo "PR already exists or no changes to sync"
