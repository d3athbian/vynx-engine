<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VYNX Engine - Platform Detector Test</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      max-width: 800px;
      margin: 50px auto;
      padding: 20px;
      background: #1a1a2e;
      color: #eee;
    }

    h1 {
      color: #00d9ff;
    }

    .card {
      background: #16213e;
      border-radius: 8px;
      padding: 20px;
      margin: 20px 0;
    }

    .label {
      color: #888;
      font-size: 12px;
    }

    .value {
      color: #00d9ff;
      font-size: 18px;
      font-weight: bold;
    }

    .badge {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 4px;
      font-size: 14px;
      margin-right: 8px;
    }

    .badge-true {
      background: #00d9ff;
      color: #1a1a2e;
    }

    .badge-false {
      background: #ff6b6b;
      color: #1a1a2e;
    }

    pre {
      background: #0f0f23;
      padding: 15px;
      border-radius: 8px;
      overflow-x: auto;
    }

    .row {
      display: flex;
      gap: 10px;
      margin: 10px 0;
    }

    .row div {
      flex: 1;
    }
  </style>
</head>

<body>
  <h1>🔍 VYNX Engine - Platform Detector</h1>

  <div class="card">
    <div class="row">
      <div>
        <div class="label">DETECTED PLATFORM</div>
        <div class="value" id="platform">Loading...</div>
      </div>
      <div>
        <div class="label">PLATFORM VERSION</div>
        <div class="value" id="version">Loading...</div>
      </div>
      <div>
        <div class="label">OPTIMAL STORAGE</div>
        <div class="value" id="storage">Loading...</div>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="label">CAPABILITIES</div>
    <pre id="capabilities">Loading...</pre>
  </div>

  <div class="card">
    <div class="label">USER AGENT</div>
    <div class="value" style="font-size: 14px;" id="ua">Loading...</div>
  </div>

  <div class="card">
    <div class="label">TEST USER AGENT (paste and click Test)</div>
    <textarea id="test-ua"
      style="width: 100%; padding: 10px; background: #0f0f23; color: #00d9ff; border: 1px solid #333; border-radius: 4px; font-family: monospace; font-size: 12px;"
      rows="3"></textarea>
    <button id="test-btn"
      style="margin-top: 10px; padding: 10px 20px; background: #00d9ff; color: #1a1a2e; border: none; border-radius: 4px; cursor: pointer; font-weight: bold;">Test
      User Agent</button>
  </div>

  <script type="module">
    import { detectPlatform, getPlatformCapabilities, getOptimalStorageType, getPlatformVersion } from './dist/index.js?v=8';

    async function run() {
      const platform = detectPlatform();
      const platformVersion = getPlatformVersion(platform);
      const capabilities = await getPlatformCapabilities(platform);
      const storage = getOptimalStorageType(platform, capabilities);

      document.getElementById('platform').textContent = platform;
      document.getElementById('version').textContent = platformVersion ?? 'N/A';
      document.getElementById('storage').textContent = storage;
      document.getElementById('ua').textContent = navigator.userAgent;
      document.getElementById('capabilities').textContent = JSON.stringify(capabilities, null, 2);
    }

    document.getElementById('test-btn').addEventListener('click', () => {
      const testUA = document.getElementById('test-ua').value;
      if (testUA) {
        console.log('Testing with User-Agent:', testUA);
        alert('User-Agent change requires page reload with DevTools. Check console for detection.');
      }
    });

    run().catch(console.error);
  </script>
</body>

</html>
